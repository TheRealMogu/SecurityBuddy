{% extends "base.html" %}

{% block title %}Server Error — Security Buddy{% endblock %}

{% block content %}
<div class="container" style="padding:6rem 1.5rem;text-align:center;">
    <div style="margin-bottom:1.5rem;">
        <i data-lucide="alert-triangle" style="width:56px;height:56px;color:var(--color-danger);"></i>
    </div>
    <h1 style="font-family:var(--font-display);font-size:4rem;font-weight:800;letter-spacing:-0.04em;margin-bottom:0.25rem;">500</h1>
    <h2 style="font-size:1.1rem;font-weight:500;color:var(--color-text-muted);margin-bottom:1rem;">Internal Server Error</h2>
    <p class="text-muted" style="max-width:380px;margin:0 auto 2rem;">
        Something went wrong on our end. Please try again in a moment.
    </p>
    <div style="display:flex;justify-content:center;gap:0.75rem;flex-wrap:wrap;">
        <a href="{{ url_for('index') }}" class="btn btn-primary">
            <i data-lucide="home" style="width:15px;height:15px;"></i>Go Home
        </a>
        <a href="javascript:location.reload()" class="btn btn-outline-secondary">
            <i data-lucide="refresh-cw" style="width:15px;height:15px;"></i>Try Again
        </a>
    </div>
</div>
{% endblock %}

{% block scripts %}<script>lucide.createIcons();</script>{% endblock %}
