{% extends "base.html" %}

{% block title %}Server Error - Security Buddy{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="error-page">
                <div class="error-icon mb-4">
                    <i data-feather="alert-triangle" style="width: 64px; height: 64px; color: #FF3B30;"></i>
                </div>
                <h1 class="display-4 fw-bold text-dark mb-3">500</h1>
                <h2 class="h4 text-muted mb-4">Internal Server Error</h2>
                <p class="text-muted mb-4">
                    Something went wrong on our end. We're working to fix it.
                </p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="{{ url_for('index') }}" class="btn btn-primary">
                        <i data-feather="home" class="me-2"></i>Go Home
                    </a>
                    <a href="javascript:location.reload()" class="btn btn-outline-primary">
                        <i data-feather="refresh-cw" class="me-2"></i>Try Again
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
