{% extends "base.html" %}

{% block title %}Page Not Found — Security Buddy{% endblock %}

{% block content %}
<div class="container" style="padding:6rem 1.5rem;text-align:center;">
    <div style="margin-bottom:1.5rem;">
        <i data-lucide="search-x" style="width:56px;height:56px;color:var(--color-text-faint);"></i>
    </div>
    <h1 style="font-family:var(--font-display);font-size:4rem;font-weight:800;letter-spacing:-0.04em;margin-bottom:0.25rem;">404</h1>
    <h2 style="font-size:1.1rem;font-weight:500;color:var(--color-text-muted);margin-bottom:1rem;">Page not found</h2>
    <p class="text-muted" style="max-width:380px;margin:0 auto 2rem;">
        The page you're looking for doesn't exist or has been moved.
    </p>
    <div style="display:flex;justify-content:center;gap:0.75rem;flex-wrap:wrap;">
        <a href="{{ url_for('index') }}" class="btn btn-primary">
            <i data-lucide="home" style="width:15px;height:15px;"></i>Go Home
        </a>
        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
            <i data-lucide="search" style="width:15px;height:15px;"></i>Start Scanning
        </a>
    </div>
</div>
{% endblock %}

{% block scripts %}<script>lucide.createIcons();</script>{% endblock %}
