{% extends "base.html" %}

{% block title %}Page Not Found - Security Buddy{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="error-page">
                <div class="error-icon mb-4">
                    <i data-feather="search" style="width: 64px; height: 64px; color: #8E95A9;"></i>
                </div>
                <h1 class="display-4 fw-bold text-dark mb-3">404</h1>
                <h2 class="h4 text-muted mb-4">Page Not Found</h2>
                <p class="text-muted mb-4">
                    The page you're looking for doesn't exist or has been moved.
                </p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="{{ url_for('index') }}" class="btn btn-primary">
                        <i data-feather="home" class="me-2"></i>Go Home
                    </a>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-primary">
                        <i data-feather="search" class="me-2"></i>Start Scanning
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
