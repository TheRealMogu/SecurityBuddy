{% extends "base.html" %}

{% block title %}Login — Security Buddy{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="auth-card">
            <div class="auth-logo">
                <i data-lucide="shield" style="width:22px;height:22px;color:var(--color-primary);"></i>
            </div>
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-sub">Sign in to access premium features</p>

            <!-- Tab switcher -->
            <div class="auth-tabs" role="tablist">
                <button class="auth-tab-btn active" id="tabLoginBtn"
                        role="tab" aria-selected="true" aria-controls="panelLogin">
                    Sign In
                </button>
                <button class="auth-tab-btn" id="tabRegisterBtn"
                        role="tab" aria-selected="false" aria-controls="panelRegister">
                    Sign Up
                </button>
            </div>

            <!-- Login panel -->
            <div class="auth-panel active" id="panelLogin" role="tabpanel" aria-labelledby="tabLoginBtn">
                <form method="POST" action="{{ url_for('login') }}" id="loginForm" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="loginUsername">Username</label>
                        <input type="text" class="form-control" id="loginUsername"
                               name="username" autocomplete="username" required>
                        <div class="field-error" id="loginUsernameError"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="loginPassword">Password</label>
                        <div class="input-password-wrapper">
                            <input type="password" class="form-control" id="loginPassword"
                                   name="password" autocomplete="current-password" required>
                            <button type="button" class="btn-toggle-password"
                                    aria-label="Show/hide password" data-target="loginPassword">
                                <i data-lucide="eye" style="width:16px;height:16px;"></i>
                            </button>
                        </div>
                        <div class="field-error" id="loginPasswordError"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i data-lucide="log-in" style="width:15px;height:15px;"></i>Sign In
                    </button>
                </form>
            </div>

            <!-- Register panel -->
            <div class="auth-panel" id="panelRegister" role="tabpanel" aria-labelledby="tabRegisterBtn">
                <form method="POST" action="{{ url_for('register') }}" id="registerForm" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="registerUsername">Username</label>
                        <input type="text" class="form-control" id="registerUsername"
                               name="username" autocomplete="username"
                               required minlength="3" maxlength="64">
                        <div class="field-error" id="registerUsernameError"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="registerEmail">Email</label>
                        <input type="email" class="form-control" id="registerEmail"
                               name="email" autocomplete="email" required>
                        <div class="field-error" id="registerEmailError"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="registerPassword">Password</label>
                        <div class="input-password-wrapper">
                            <input type="password" class="form-control" id="registerPassword"
                                   name="password" autocomplete="new-password"
                                   required minlength="6">
                            <button type="button" class="btn-toggle-password"
                                    aria-label="Show/hide password" data-target="registerPassword">
                                <i data-lucide="eye" style="width:16px;height:16px;"></i>
                            </button>
                        </div>
                        <div class="password-strength mt-2" id="passwordStrengthWrapper" style="display:none;">
                            <div class="password-strength-bar">
                                <div class="password-strength-fill" id="passwordStrengthFill"></div>
                            </div>
                            <small class="password-strength-label" id="passwordStrengthLabel"></small>
                        </div>
                        <div class="field-error" id="registerPasswordError"></div>
                    </div>
                    <div class="form-group" style="display:flex;align-items:flex-start;gap:0.5rem;">
                        <input type="checkbox" id="agreeTerms" name="agree_terms"
                               style="width:16px;height:16px;margin-top:3px;flex-shrink:0;" required>
                        <label for="agreeTerms" style="font-size:0.85rem;color:var(--color-text-muted);cursor:pointer;">
                            I agree to the Terms of Service
                        </label>
                    </div>
                    <div class="field-error mb-2" id="agreeTermsError"></div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i data-lucide="user-plus" style="width:15px;height:15px;"></i>Create Account
                    </button>
                </form>
            </div>

            <div class="text-center mt-3">
                <a href="{{ url_for('index') }}" class="small text-muted">
                    ← Back to Scanner
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Tab switching
document.getElementById('tabLoginBtn').addEventListener('click', function() {
    this.classList.add('active');
    document.getElementById('tabRegisterBtn').classList.remove('active');
    document.getElementById('panelLogin').classList.add('active');
    document.getElementById('panelRegister').classList.remove('active');
});
document.getElementById('tabRegisterBtn').addEventListener('click', function() {
    this.classList.add('active');
    document.getElementById('tabLoginBtn').classList.remove('active');
    document.getElementById('panelRegister').classList.add('active');
    document.getElementById('panelLogin').classList.remove('active');
});

// Open register tab if URL hash matches
if (window.location.hash === '#register') {
    document.getElementById('tabRegisterBtn').click();
}

lucide.createIcons();
</script>
{% endblock %}
